<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Chipa Viajera - Edición Completa</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 400px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
        }

        canvas {
            border: 4px solid #3e2723;
            background-color: #e0f7fa;
            display: block;
        }

        #shareScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            box-sizing: border-box;
            padding: 20px;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
        }

        .share-left {
            text-align: center;
            width: 45%;
        }

        .share-left img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 10px;
            border: 3px solid #ffd54f;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .share-right {
            width: 45%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .share-right h2 {
            margin: 0;
            color: #ffd54f;
            font-family: 'Impact', sans-serif;
            letter-spacing: 1px;
        }

        .share-right input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ffd54f;
            background-color: #222;
            color: white;
            border-radius: 5px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            padding: 10px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
            color: white;
        }
        .btn-ws { background-color: #25D366; }
        .btn-fb { background-color: #1877F2; }
        .btn-em { background-color: #ea4335; }
        .btn-dl { background-color: #607d8b; }
        .btn-close { background-color: #9e9e9e; grid-column: span 2; margin-top: 5px;}
        .btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div id="shareScreen" style="display: none;">
            <div class="share-left">
                <img src="Chipa Viajera con maletas1.png" alt="Chipa Viajera">
                <p id="txtPuntajeLogro" style="font-size: 18px; margin-top: 10px; font-weight: bold;"></p>
            </div>
            <div class="share-right">
                <h2>¡COMPARTÍ TU VIAJE!</h2>
                <label for="playerName">Ingresá tu nombre:</label>
                <input type="text" id="playerName" placeholder="Ej: Juan" value="Un Viajero">
                
                <div class="btn-grid">
                    <button class="btn btn-ws" onclick="compartir('whatsapp')">WhatsApp</button>
                    <button class="btn btn-fb" onclick="compartir('facebook')">Facebook</button>
                    <button class="btn btn-em" onclick="compartir('email')">Correo</button>
                    <button class="btn btn-dl" onclick="descargarLogro()">Descargar Info</button>
                    <button class="btn btn-close" onclick="cerrarCompartir()">Volver al Juego</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        // ==========================================
        // --- CARGA SEGURA DE ASSETS ---
        // ==========================================
        const TAMAÑO_CHIPA = 70; 

        const imgCorre1 = new Image(); 
        const imgCorre2 = new Image(); 
        const imgCorre3 = new Image(); 
        const imgSalta = new Image();  
        const imgChoca = new Image();  
        const imgFondoLvl1 = new Image();
        const imgFondoLvl2 = new Image();
        const imgChiperita = new Image();


        // Definimos las rutas (Se hace después del onload por seguridad)
        imgCorre1.src = 'chipa_run_1.png';
        imgCorre2.src = 'chipa_run_B.png';
        imgCorre3.src = 'chipa_run_C.png';
        imgSalta.src  = 'chipa_jump.png';
        imgChoca.src  = 'chipa_crash.png';
        imgFondoLvl1.src = 'fondo_nivel1.png';
        imgFondoLvl2.src = 'fondo_nivel2.png';
        imgChiperita.src = 'Chiperitas atrapa Chipas1.png';

        // Tamaño fijo de la chiperitas
        const ANCHO_CHIPERITA = 55;
        const ALTO_CHIPERITA = 75;

        // ==========================================
        // --- VARIABLES DE ESTADO ---
        // ==========================================
        let estadoJuego = 'INICIO'; 

        let chipa = { 
            x: 80, y: 350 - TAMAÑO_CHIPA, ancho: TAMAÑO_CHIPA, alto: TAMAÑO_CHIPA,
            vy: 0, gravedad: 1.5, salto: -21, enElSuelo: true, // Corregido: Arranca en el suelo
            frameActual: 0, timerAnimacion: 0
        };

        let obstaculo = { x: 900, y: 310, ancho: 40, alto: 40, velocidadActual: 6 };

        let score = 0;
        let nivel = 1;
        let timerAnuncioNivel = 0;

        const configuracionNiveles = {
            1: { nombre: "Nivel 1: Salida de Asunción", fondo: "#e0f7fa", velocidad: 6 },
            2: { nombre: "Nivel 2: Cerros de Paraguarí", fondo: "#fff9c4", velocidad: 7.2 },
            3: { nombre: "Nivel 3: Cruce Coronel Oviedo", fondo: "#ffe0b2", velocidad: 8.5 },
            4: { nombre: "Nivel 4: Ka'akupé bajo la lluvia", fondo: "#b0bec5", velocidad: 9.8 },
            5: { nombre: "Nivel 5: Camino a Villarrica", fondo: "#c8e6c9", velocidad: 11 },
            6: { nombre: "Nivel 6: Pasando por Caazapá", fondo: "#d1c4e9", velocidad: 12.2 },
            7: { nombre: "Nivel 7: San Cosme y Damián", fondo: "#ffccbc", velocidad: 13.5 },
            8: { nombre: "Nivel 8: Costanera de Encarnación", fondo: "#bbdefb", velocidad: 14.8 },
            9: { nombre: "Nivel 9: Ruta Transchaco desértica", fondo: "#cfd8dc", velocidad: 16 },
            10: { nombre: "Nivel 10: ¡Llegada a Filadelfia!", fondo: "#b2dfdb", velocidad: 17.5 }
        };

        // ==========================================
        // --- CONTROL DE TECLADO ---
        // ==========================================
        window.addEventListener("keydown", (e) => {
            if (document.getElementById("shareScreen").style.display === "flex") return;

            if (e.code === "Space") {
                if (estadoJuego === 'GAMEOVER') {
                    prepararPrimerNivel();
                } else if (estadoJuego === 'INICIO') {
                    estadoJuego = 'JUGANDO';
                    timerAnuncioNivel = 90;
                } else if (estadoJuego === 'JUGANDO' && chipa.enElSuelo) {
                    chipa.vy = chipa.salto;
                    chipa.enElSuelo = false;
                }
            }

            if (e.key.toLowerCase() === 'c' && estadoJuego === 'GAMEOVER') {
                abrirCompartir();
            }
        });

        function prepararPrimerNivel() {
            score = 0;
            nivel = 1;
            estadoJuego = 'INICIO';
            chipa.y = 350 - TAMAÑO_CHIPA;
            chipa.vy = 0;
            chipa.enElSuelo = true; // Corregido: Resetea en el suelo
            timerAnuncioNivel = 0;
            obstaculo.velocidadActual = configuracionNiveles[1].velocidad;
            reposicionarObstaculo();
        }

        function reposicionarObstaculo() {
            obstaculo.x = canvas.width + Math.random() * 450 + 150;
            obstaculo.ancho = 35 + Math.random() * 25;
            obstaculo.alto = 35 + Math.random() * 20;
            obstaculo.y = 350 - obstaculo.alto;
        }

        function actualizarDificultad() {
            let nivelAnterior = nivel;

            // Corregido el bug del "node = 3"
            if (score < 5) nivel = 1;
            else if (score < 10) nivel = 2;
            else if (score < 15) nivel = 3; // ¡AQUÍ ESTABA EL ERROR!
            else if (score < 25) nivel = 4;
            else if (score < 35) nivel = 5;
            else if (score < 45) nivel = 6;
            else if (score < 55) nivel = 7;
            else if (score < 65) nivel = 8;
            else if (score < 75) nivel = 9;
            else nivel = 10;

            if (nivel !== nivelAnterior && nivel <= 10) {
                timerAnuncioNivel = 90;
            }

            obstaculo.velocidadActual = configuracionNiveles[nivel].velocidad;
        }

        // ==========================================
        // --- BUCLE DE JUEGO ---
        // ==========================================
        function loop() {
            if (estadoJuego === 'JUGANDO') {
                chipa.vy += chipa.gravedad;
                chipa.y += chipa.vy;

                const sueloY = 350 - chipa.alto;
                if (chipa.y >= sueloY) { 
                    chipa.y = sueloY;
                    chipa.vy = 0;
                    chipa.enElSuelo = true;
                }

                obstaculo.x -= obstaculo.velocidadActual;
                
                if (obstaculo.x < -obstaculo.ancho) {
                    score++;
                    actualizarDificultad();
                    reposicionarObstaculo();
                }

                let margenX = chipa.ancho * 0.18; 
                let margenY = chipa.alto * 0.1;   

                let chipaIzquierda = chipa.x + margenX;
                let chipaDerecha = chipa.x + chipa.ancho - margenX;
                let chipaArriba = chipa.y + margenY;
                let chipaAbajo = chipa.y + chipa.alto; 

                if (chipaIzquierda < obstaculo.x + obstaculo.ancho &&
                    chipaDerecha > obstaculo.x &&
                    chipaArriba < obstaculo.y + obstaculo.alto &&
                    chipaAbajo > obstaculo.y) {
                    estadoJuego = 'GAMEOVER'; 
                }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar fondo según el nivel
            if (nivel === 1 && imgFondoLvl1.naturalWidth > 0) {
                ctx.drawImage(imgFondoLvl1, 0, 0, canvas.width, canvas.height);
            } else if (nivel === 2 && imgFondoLvl2.naturalWidth > 0) {
                ctx.drawImage(imgFondoLvl2, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = configuracionNiveles[nivel].fondo;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            ctx.fillStyle = "#555555"; 
            ctx.fillRect(0, 350, canvas.width, 50);
            ctx.fillStyle = "#ffd54f"; 
            ctx.fillRect(0, 368, canvas.width, 4);

            let imagenADibujar = imgCorre1; 

            if (estadoJuego === 'GAMEOVER') {
                imagenADibujar = imgChoca; 
            } else if (!chipa.enElSuelo) {
                imagenADibujar = imgSalta;
            } else if (estadoJuego === 'JUGANDO') {
                chipa.timerAnimacion++;
                if (chipa.timerAnimacion % 6 === 0) { 
                    chipa.frameActual = (chipa.frameActual + 1) % 3; 
                }
                if (chipa.frameActual === 0) imagenADibujar = imgCorre1;
                else if (chipa.frameActual === 1) imagenADibujar = imgCorre2;
                else imagenADibujar = imgCorre3;
            }

            // Dibuja la chipa siempre (sin bloqueo por naturalWidth)
            ctx.drawImage(imagenADibujar, chipa.x, chipa.y, chipa.ancho, chipa.alto);

            // Dibujar obstáculo como chiperitas (tamaño fijo)
            if (imgChiperita.naturalWidth > 0) {
                ctx.drawImage(imgChiperita, obstaculo.x, obstaculo.y, ANCHO_CHIPERITA, ALTO_CHIPERITA);
            } else {
                ctx.fillStyle = "#e53935";
                ctx.fillRect(obstaculo.x, obstaculo.y, ANCHO_CHIPERITA, ALTO_CHIPERITA);
            }

            ctx.fillStyle = (nivel === 4 || nivel === 9) ? "#ffffff" : "#000000"; 
            ctx.font = "bold 15px Arial";
            ctx.fillText(configuracionNiveles[nivel].nombre, 20, 30);
            ctx.fillText("Chipas Salvadas: " + score, 20, 55);

            if (timerAnuncioNivel > 0 && estadoJuego === 'JUGANDO') {
                ctx.save();
                ctx.textAlign = "center";
                ctx.font = "bold 46px 'Impact', sans-serif";
                
                ctx.strokeStyle = "#000000";
                ctx.lineWidth = 6;
                ctx.strokeText("NIVEL " + nivel, canvas.width / 2, 130);
                
                ctx.fillStyle = "#ffd54f";
                ctx.fillText("NIVEL " + nivel, canvas.width / 2, 130);
                ctx.restore();
                
                timerAnuncioNivel--;
            }

            if (estadoJuego === 'INICIO') {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 32px 'Impact', sans-serif";
                ctx.textAlign = "center";
                ctx.fillText("¡PREPARATE!", canvas.width / 2, 170);
                ctx.font = "18px Arial";
                ctx.fillText("Presioná la barra ESPACIO para empezar a viajar", canvas.width / 2, 220);
                ctx.textAlign = "start";
            }
            
            if (estadoJuego === 'GAMEOVER') {
                ctx.fillStyle = "rgba(0,0,0,0.75)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 26px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Chipas salvadas: " + score, canvas.width / 2, 150);
                
                ctx.font = "18px Arial";
                ctx.fillStyle = "#e0e0e0";
                ctx.fillText("Presioná ESPACIO para reiniciar", canvas.width / 2, 210);
                
                ctx.fillStyle = "#ffd54f";
                ctx.font = "bold 18px Arial";
                ctx.fillText("Presioná la tecla 'C' para COMPARTIR tu logro", canvas.width / 2, 260);
                ctx.textAlign = "start"; 
            }

            requestAnimationFrame(loop);
        }

        // ==========================================
        // --- FUNCIONES DE LA INTERFAZ COMPARTIR ---
        // ==========================================
        function abrirCompartir() {
            document.getElementById("txtPuntajeLogro").innerText = `¡Salvaste ${score} chipas en la ruta!`;
            document.getElementById("shareScreen").style.display = "flex";
        }

        function cerrarCompartir() {
            document.getElementById("shareScreen").style.display = "none";
        }

        function obtenerMensaje() {
            let nombre = document.getElementById("playerName").value || "Un Viajero";
            return encodeURIComponent(`¡${nombre} salvó ${score} chipas en el juego "La Chipa Viajera"! 🥮🇵🇾 ¿Podés superarlo?`);
        }

        function compartir(plataforma) {
            let texto = obtenerMensaje();
            let url = "";
            
            if (plataforma === 'whatsapp') {
                url = `https://api.whatsapp.com/send?text=${texto}`;
            } else if (plataforma === 'facebook') {
                url = `https://www.facebook.com/sharer/sharer.php?u=https://lachipaviajera.com&quote=${texto}`;
            } else if (plataforma === 'email') {
                url = `mailto:?subject=¡Mi Logro en La Chipa Viajera!&body=${texto}`;
            }
            
            window.open(url, '_blank');
        }

        function descargarLogro() {
            let nombre = document.getElementById("playerName").value || "Un Viajero";
            let contenido = `--- CERTIFICADO DE LA CHIPA VIAJERA ---\n\nFelicitaciones ${nombre}.\nLograste salvar un total de: ${score} chipas en las rutas de Paraguay.\n\n¡Gracias por jugar!`;
            
            let blob = new Blob([contenido], { type: "text/plain;charset=utf-8" });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Logro_ChipaViajera_${nombre}.txt`;
            link.click();
        }

        // Arrancar el juego
        requestAnimationFrame(loop);
    </script>
</body>
</html>
