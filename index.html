<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Chipa Viajera - Edición Completa</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 800px;
            height: 400px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
        }

        canvas {
            border: 4px solid #3e2723;
            background-color: #e0f7fa;
            display: block;
        }

        #shareScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            box-sizing: border-box;
            padding: 20px;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
        }

        .share-left {
            text-align: center;
            width: 45%;
        }

        .share-left img {
            max-width: 100%;
            max-height: 220px;
            border-radius: 10px;
            border: 3px solid #ffd54f;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .share-right {
            width: 45%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .share-right h2 {
            margin: 0;
            color: #ffd54f;
            font-family: 'Impact', sans-serif;
            letter-spacing: 1px;
        }

        .share-right input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ffd54f;
            background-color: #222;
            color: white;
            border-radius: 5px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            padding: 10px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
            color: white;
        }
        .btn-ws { background-color: #25D366; }
        .btn-fb { background-color: #1877F2; }
        .btn-em { background-color: #ea4335; }
        .btn-dl { background-color: #607d8b; }
        .btn-close { background-color: #9e9e9e; grid-column: span 2; margin-top: 5px;}
        .btn:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div id="shareScreen" style="display: none;">
            <div class="share-left">
                <img src="Chipa%20Viajera%20con%20maletas1.png" alt="Chipa Viajera">
                <p id="txtPuntajeLogro" style="font-size: 18px; margin-top: 10px; font-weight: bold;"></p>
            </div>
            <div class="share-right">
                <h2>¡COMPARTÍ TU VIAJE!</h2>
                <label for="playerName">Ingresá tu nombre:</label>
                <input type="text" id="playerName" placeholder="Ej: Juan" value="Un Viajero">
                
                <div class="btn-grid">
                    <button class="btn btn-ws" onclick="compartir('whatsapp')">WhatsApp</button>
                    <button class="btn btn-fb" onclick="compartir('facebook')">Facebook</button>
                    <button class="btn btn-em" onclick="compartir('email')">Correo</button>
                    <button class="btn btn-dl" onclick="descargarLogro()">Descargar Info</button>
                    <button class="btn btn-close" onclick="cerrarCompartir()">Volver al Juego</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        // ==========================================
        // --- CARGA SEGURA DE ASSETS ---
        // ==========================================
        const TAMAÑO_CHIPA = 70; 

        const imgCorre1 = new Image(); 
        const imgCorre2 = new Image(); 
        const imgCorre3 = new Image(); 
        const imgSalta = new Image();  
        const imgChoca = new Image();  
        const fondosNivel = Array.from({length:10}, ()=>new Image());
        const imgChiperita = new Image();


        // Definimos las rutas (Se hace después del onload por seguridad)
        imgCorre1.src = 'chipa_run_1.png';
        imgCorre2.src = 'chipa_run_B.png';
        imgCorre3.src = 'chipa_run_C.png';
        imgSalta.src  = 'chipa_jump.png';
        imgChoca.src  = 'chipa_crash.png';
        for(let i=0;i<10;i++){ fondosNivel[i].src = `fondo_nivel${i+1}.png`; }
        imgChiperita.src = 'Chiperitas%20atrapa%20Chipas1.png';

        // Tamaño fijo de la chiperitas
        const ANCHO_CHIPERITA = 55;
        const ALTO_CHIPERITA = 75;

        // ==========================================
        // --- VARIABLES DE ESTADO ---
        // ==========================================
        let estadoJuego = 'INICIO'; 

        let chipa = { 
            x: 80, y: 360 - TAMAÑO_CHIPA, ancho: TAMAÑO_CHIPA, alto: TAMAÑO_CHIPA,
            vy: 0, gravedad: 1.5, salto: -21, enElSuelo: true, // Corregido: Arranca en el suelo
            frameActual: 0, timerAnimacion: 0
        };

        // Sistema de obstáculos múltiples
        let velocidadJuego = 7;
        let obstaculos = [{ x: 950, y: 360 - ALTO_CHIPERITA }];
        let distanciaMinima = 300;  // separación mínima entre grupos

        let score = 0;
        let nivel = 1;
        let timerAnuncioNivel = 0;

        const configuracionNiveles = {
            // velocidad: px/frame | distMin: espacio mínimo entre obstáculos
            // probDoble: chance de que aparezcan 2 juntos | probTriple: chance de 3
            1: { nombre:"Nivel 1: Palacio de López",          velocidad:5,    distMin:320, probDoble:0.00, probTriple:0.00 },
            2: { nombre:"Nivel 2: Costanera",                 velocidad:6.5,  distMin:290, probDoble:0.10, probTriple:0.00 },
            3: { nombre:"Nivel 3: Teatro",                    velocidad:8,    distMin:260, probDoble:0.20, probTriple:0.00 },
            4: { nombre:"Nivel 4: Panteón de los Héroes",     velocidad:9.5,  distMin:240, probDoble:0.25, probTriple:0.05 },
            5: { nombre:"Nivel 5: Catedral",                  velocidad:11,   distMin:220, probDoble:0.30, probTriple:0.10 },
            6: { nombre:"Nivel 6: Casa de la Independencia",  velocidad:12.5, distMin:200, probDoble:0.35, probTriple:0.15 },
            7: { nombre:"Nivel 7: Areguá",                    velocidad:14,   distMin:185, probDoble:0.40, probTriple:0.20 },
            8: { nombre:"Nivel 8: Encarnación",               velocidad:15.5, distMin:170, probDoble:0.45, probTriple:0.25 },
            9: { nombre:"Nivel 9: México",                    velocidad:17,   distMin:155, probDoble:0.50, probTriple:0.30 },
            10:{ nombre:"Nivel 10: Tatakuá",                  velocidad:19,   distMin:140, probDoble:0.55, probTriple:0.35 }
        };

        // ==========================================
        // --- CONTROL DE TECLADO ---
        // ==========================================
        window.addEventListener("keydown", (e) => {
            if (document.getElementById("shareScreen").style.display === "flex") return;

            if (e.code === "Space") {
                if (estadoJuego === 'GAMEOVER') {
                    prepararPrimerNivel();
                } else if (estadoJuego === 'INICIO') {
                    estadoJuego = 'JUGANDO';
                    timerAnuncioNivel = 90;
                } else if (estadoJuego === 'JUGANDO' && chipa.enElSuelo) {
                    chipa.vy = chipa.salto;
                    chipa.enElSuelo = false;
                }
            }

            if (e.key.toLowerCase() === 'c' && estadoJuego === 'GAMEOVER') {
                abrirCompartir();
            }
        });

        function prepararPrimerNivel() {
            score = 0;
            nivel = 1;
            estadoJuego = 'INICIO';
            chipa.y = 340 - TAMAÑO_CHIPA;
            chipa.vy = 0;
            chipa.enElSuelo = true; // Corregido: Resetea en el suelo
            timerAnuncioNivel = 0;
            velocidadJuego = configuracionNiveles[1].velocidad;
            obstaculos = [{ x: 950, y: 360 - ALTO_CHIPERITA }];
        }

        function crearGrupoObstaculos() {
            const cfg = configuracionNiveles[nivel];
            const baseX = canvas.width + cfg.distMin + Math.random() * 120;
            
            // Separación entre chiperitas: suficiente para que la chipa aterrice y vuelva a saltar
            // La chipa tarda ~28 frames en saltar y aterrizar → a velocidad máxima (19px) = ~530px
            // Usamos 240px mínimo (niveles lentos) que se reduce un poco en niveles rápidos
            const separacion = Math.max(200, 280 - nivel * 8);

            let cantidad = 1;
            const r = Math.random();
            if (r < cfg.probTriple) cantidad = 3;
            else if (r < cfg.probDoble) cantidad = 2;

            obstaculos = [];
            for (let i = 0; i < cantidad; i++) {
                obstaculos.push({ x: baseX + i * separacion, y: 360 - ALTO_CHIPERITA });
            }
        }
        
        // alias para compatibilidad
        function reposicionarObstaculo() { crearGrupoObstaculos(); }

        function actualizarDificultad() {
            let nivelAnterior = nivel;

            if      (score < 5)  nivel = 1;
            else if (score < 10) nivel = 2;
            else if (score < 16) nivel = 3;
            else if (score < 23) nivel = 4;
            else if (score < 31) nivel = 5;
            else if (score < 40) nivel = 6;
            else if (score < 50) nivel = 7;
            else if (score < 61) nivel = 8;
            else if (score < 73) nivel = 9;
            else                 nivel = 10;

            if (nivel !== nivelAnterior) {
                timerAnuncioNivel = 90;
            }

            velocidadJuego = configuracionNiveles[nivel].velocidad;
        }

        // ==========================================
        // --- BUCLE DE JUEGO ---
        // ==========================================
        function loop() {
            if (estadoJuego === 'JUGANDO') {
                chipa.vy += chipa.gravedad;
                chipa.y += chipa.vy;

                const sueloY = 360 - chipa.alto;
                if (chipa.y >= sueloY) { 
                    chipa.y = sueloY;
                    chipa.vy = 0;
                    chipa.enElSuelo = true;
                }

                // Mover todos los obstáculos
                for (let obs of obstaculos) { obs.x -= velocidadJuego; }

                // Eliminar chiperitas que salieron de pantalla
                obstaculos = obstaculos.filter(obs => obs.x > -ANCHO_CHIPERITA);

                // Cuando el grupo entero salió → sumar punto y generar nuevo grupo
                if (obstaculos.length === 0) {
                    score++;
                    actualizarDificultad();
                    crearGrupoObstaculos();
                }

                // Colisión con hitbox generosa
                let margenX = chipa.ancho * 0.30; 
                let margenY = chipa.alto * 0.25;   
                let chipaIzquierda = chipa.x + margenX;
                let chipaDerecha   = chipa.x + chipa.ancho - margenX;
                let chipaArriba    = chipa.y + margenY;
                let chipaAbajo     = chipa.y + chipa.alto;

                for (let obs of obstaculos) {
                    let obsMargen = ANCHO_CHIPERITA * 0.20;
                    let obsX      = obs.x + obsMargen;
                    let obsAncho  = ANCHO_CHIPERITA - obsMargen * 2;
                    let obsAlto   = ALTO_CHIPERITA * 0.80;

                    if (chipaIzquierda < obsX + obsAncho &&
                        chipaDerecha   > obsX &&
                        chipaArriba    < obs.y + obsAlto &&
                        chipaAbajo     > obs.y) {
                        estadoJuego = 'GAMEOVER';
                    }
                }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const fondoActual = fondosNivel[nivel-1];
            if (fondoActual && fondoActual.naturalWidth > 0){
                ctx.drawImage(fondoActual,0,0,canvas.width,canvas.height);
            } else {
                ctx.fillStyle='#e0f7fa';
                ctx.fillRect(0,0,canvas.width,canvas.height);
            }

            ctx.fillStyle = "#555555"; 
            ctx.fillRect(0, 360, canvas.width, 40);
            ctx.fillStyle = "#ffd54f"; 
            ctx.fillRect(0, 362, canvas.width, 4);
            ctx.fillStyle="#ffd54f";
            ctx.font="14px Arial";
            ctx.textAlign="right";
            ctx.fillText("Matías Brizzio © 2026 Juan Tereré", canvas.width-12, 395);
            ctx.textAlign="start";

            let imagenADibujar = imgCorre1; 

            if (estadoJuego === 'GAMEOVER') {
                imagenADibujar = imgChoca; 
            } else if (!chipa.enElSuelo) {
                imagenADibujar = imgSalta;
            } else if (estadoJuego === 'JUGANDO') {
                chipa.timerAnimacion++;
                if (chipa.timerAnimacion % 6 === 0) { 
                    chipa.frameActual = (chipa.frameActual + 1) % 3; 
                }
                if (chipa.frameActual === 0) imagenADibujar = imgCorre1;
                else if (chipa.frameActual === 1) imagenADibujar = imgCorre2;
                else imagenADibujar = imgCorre3;
            }

            // Dibuja la chipa - con fallback si la imagen aún no cargó
            if (imagenADibujar.complete && imagenADibujar.naturalWidth > 0) {
                ctx.drawImage(imagenADibujar, chipa.x, chipa.y, chipa.ancho, chipa.alto);
            } else {
                // Fallback: círculo amarillo mientras carga
                ctx.fillStyle = "#ffd54f";
                ctx.beginPath();
                ctx.arc(chipa.x + chipa.ancho/2, chipa.y + chipa.alto/2, chipa.ancho/2, 0, Math.PI*2);
                ctx.fill();
            }

            // Dibujar todas las chiperitas del grupo actual
            for (let obs of obstaculos) {
                if (imgChiperita.complete && imgChiperita.naturalWidth > 0) {
                    ctx.drawImage(imgChiperita, obs.x, obs.y, ANCHO_CHIPERITA, ALTO_CHIPERITA);
                } else {
                    ctx.fillStyle = "#e53935";
                    ctx.fillRect(obs.x, obs.y, ANCHO_CHIPERITA, ALTO_CHIPERITA);
                }
            }

            ctx.fillStyle = "#000000"; 
            ctx.font = "bold 15px Arial";
            ctx.fillText(configuracionNiveles[nivel].nombre, 20, 30);
            ctx.fillText("Puntos: " + score, 20, 55);

            if (timerAnuncioNivel > 0 && estadoJuego === 'JUGANDO') {
                ctx.save();
                ctx.textAlign = "center";
                ctx.font = "bold 46px 'Impact', sans-serif";
                
                ctx.strokeStyle = "#000000";
                ctx.lineWidth = 6;
                ctx.strokeText("NIVEL " + nivel, canvas.width / 2, 130);
                
                ctx.fillStyle = "#ffd54f";
                ctx.fillText("NIVEL " + nivel, canvas.width / 2, 130);
                ctx.restore();
                
                timerAnuncioNivel--;
            }

            if (estadoJuego === 'INICIO') {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 32px 'Impact', sans-serif";
                ctx.textAlign = "center";
                ctx.font = "bold 32px 'Impact', sans-serif";
                ctx.letterSpacing = "8px";
                ctx.fillText("¡PREPARATE!", canvas.width / 2, 170);
                ctx.letterSpacing = "0px";
                ctx.font = "18px Arial";
                ctx.fillText("Presioná la barra ESPACIO para escaparte", canvas.width / 2, 220);
                ctx.textAlign = "start";
            }
            
            if (estadoJuego === 'GAMEOVER') {
                ctx.fillStyle = "rgba(0,0,0,0.75)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 26px Arial";
                ctx.textAlign = "center";
                ctx.fillText("Chipas salvadas: " + score, canvas.width / 2, 150);
                
                ctx.font = "18px Arial";
                ctx.fillStyle = "#e0e0e0";
                ctx.fillText("Presioná ESPACIO para reiniciar", canvas.width / 2, 210);
                
                ctx.fillStyle = "#ffd54f";
                ctx.font = "bold 18px Arial";
                ctx.fillText("Presioná la tecla 'C' para COMPARTIR tu logro", canvas.width / 2, 260);
                ctx.textAlign = "start"; 
            }

            requestAnimationFrame(loop);
        }

        // ==========================================
        // --- FUNCIONES DE LA INTERFAZ COMPARTIR ---
        // ==========================================
        function abrirCompartir() {
            document.getElementById("txtPuntajeLogro").innerText = `¡Salvaste ${score} chipas en la ruta!`;
            document.getElementById("shareScreen").style.display = "flex";
        }

        function cerrarCompartir() {
            document.getElementById("shareScreen").style.display = "none";
        }

        function obtenerMensaje() {
            let nombre = document.getElementById("playerName").value || "Un Viajero";
            return encodeURIComponent(`¡${nombre} salvó ${score} chipas en La Chipa Viajera! 🫓🌍 ¿Podés superarme? Jugá acá: https://juanterere.github.io/Escape-de-la-Chipa-Viajera/`);
        }

        function compartir(plataforma) {
            let texto = obtenerMensaje();
            let url = "";
            
            if (plataforma === 'whatsapp') {
                url = `https://api.whatsapp.com/send?text=${texto}`;
            } else if (plataforma === 'facebook') {
                url = `https://www.facebook.com/sharer/sharer.php?u=https://lachipaviajera.com&quote=${texto}`;
            } else if (plataforma === 'email') {
                url = `mailto:?subject=¡Mi Logro en La Chipa Viajera!&body=${texto}`;
            }
            
            window.open(url, '_blank');
        }

        function descargarLogro() {
            let nombre = document.getElementById("playerName").value || "Un Viajero";
            let contenido = `--- CERTIFICADO DE LA CHIPA VIAJERA ---\n\nFelicitaciones ${nombre}.\nLograste salvar un total de: ${score} chipas en las rutas de Paraguay.\n\n¡Gracias por jugar!`;
            
            let blob = new Blob([contenido], { type: "text/plain;charset=utf-8" });
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Logro_ChipaViajera_${nombre}.txt`;
            link.click();
        }

        // Arrancar el juego
        requestAnimationFrame(loop);
    </script>
</body>
</html>
