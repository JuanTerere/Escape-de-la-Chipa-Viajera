<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Chipa Viajera - Edición Móvil</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            /* Evita que el celular haga zoom al tocar rápido */
            touch-action: none; 
        }
        
        #gameContainer {
            position: relative;
            /* El contenedor se adapta al ancho de la pantalla, hasta un máximo de 800px */
            width: 100%;
            max-width: 800px;
            /* Mantiene la proporción original de 800x400 (2 a 1) */
            aspect-ratio: 2 / 1; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
            background-color: #e0f7fa;
        }

        /* El canvas ahora ocupa el 100% de su contenedor responsivo */
        canvas {
            border: 4px solid #3e2723;
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Botón de Pantalla Completa */
        #btnFullscreen {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid #ffd54f;
            border-radius: 8px;
            padding: 8px 12px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
        }

        #btnFullscreen:hover { background: rgba(0, 0, 0, 0.9); }

        /* Pantalla flotante de Compartir Logro */
        #shareScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            box-sizing: border-box;
            padding: 20px;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            z-index: 20;
        }

        .share-left { text-align: center; width: 45%; }
        .share-left img {
            max-width: 100%; max-height: 220px;
            border-radius: 10px; border: 3px solid #ffd54f;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .share-right { width: 45%; display: flex; flex-direction: column; gap: 12px; }
        .share-right h2 { margin: 0; color: #ffd54f; font-family: 'Impact', sans-serif; letter-spacing: 1px; }
        .share-right input {
            padding: 10px; font-size: 16px; border: 2px solid #ffd54f;
            background-color: #222; color: white; border-radius: 5px; width: 100%; box-sizing: border-box;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 10px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; text-align: center; color: white; }
        .btn-ws { background-color: #25D366; }
        .btn-fb { background-color: #1877F2; }
        .btn-em { background-color: #ea4335; }
        .btn-dl { background-color: #607d8b; }
        .btn-close { background-color: #9e9e9e; grid-column: span 2; margin-top: 5px;}

        /* Ajustes para celulares en la pantalla de compartir */
        @media (max-width: 600px) {
            #shareScreen { flex-direction: column; padding: 10px; overflow-y: auto; }
            .share-left, .share-right { width: 100%; }
            .share-left img { max-height: 150px; }
            #btnFullscreen { font-size: 12px; padding: 5px 8px; }
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <button id="btnFullscreen" onclick="toggleFullscreen()">🔲 Ampliar</button>

        <div id="shareScreen" style="display: none;">
            <div class="share-left">
                <img src="Chipa Viajera con maletas1.png" alt="Chipa Viajera">
                <p id="txtPuntajeLogro" style="font-size: 18px; margin-top: 10px; font-weight: bold;"></p>
            </div>
            <div class="share-right">
                <h2>¡COMPARTÍ TU VIAJE!</h2>
                <label for="playerName">Ingresá tu nombre:</label>
                <input type="text" id="playerName" placeholder="Ej: Juan" value="Un Viajero">
                
                <div class="btn-grid">
                    <button class="btn btn-ws" onclick="compartir('whatsapp')">WhatsApp</button>
                    <button class="btn btn-fb" onclick="compartir('facebook')">Facebook</button>
                    <button class="btn btn-em" onclick="compartir('email')">Correo</button>
                    <button class="btn btn-dl" onclick="descargarLogro()">Descargar Info</button>
                    <button class="btn btn-close" onclick="cerrarCompartir()">Volver al Juego</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = 'high';

        // --- CARGA SEGURA DE ASSETS ---
        const TAMAÑO_CHIPA = 70; 
        const imgCorre1 = new Image(); const imgCorre2 = new Image(); const imgCorre3 = new Image(); 
        const imgSalta = new Image();  const imgChoca = new Image();  const imgFondoLvl1 = new Image(); 

        let imagenesCargadas = 0; const totalImagenes = 6;

        function iniciarJuego() {
            imagenesCargadas++;
            if (imagenesCargadas === totalImagenes) { requestAnimationFrame(loop); }
        }

        imgCorre1.onload = iniciarJuego; imgCorre1.onerror = iniciarJuego;
        imgCorre2.onload = iniciarJuego; imgCorre2.onerror = iniciarJuego;
        imgCorre3.onload = iniciarJuego; imgCorre3.onerror = iniciarJuego;
        imgSalta.onload = iniciarJuego;  imgSalta.onerror = iniciarJuego;
        imgChoca.onload = iniciarJuego;  imgChoca.onerror = iniciarJuego;
        imgFondoLvl1.onload = iniciarJuego; imgFondoLvl1.onerror = iniciarJuego;

        imgCorre1.src = 'chipa_run_1.png'; imgCorre2.src = 'chipa_run_B.png'; imgCorre3.src = 'chipa_run_C.png';
        imgSalta.src  = 'chipa_jump.png';  imgChoca.src  = 'chipa_crash.png'; imgFondoLvl1.src = 'fondo_nivel1.png';

        // --- VARIABLES DE ESTADO ---
        let estadoJuego = 'INICIO'; 
        let chipa = { x: 80, y: 350 - TAMAÑO_CHIPA, ancho: TAMAÑO_CHIPA, alto: TAMAÑO_CHIPA, vy: 0, gravedad: 1.5, salto: -21, enElSuelo: true, frameActual: 0, timerAnimacion: 0 };
        let obstaculo = { x: 900, y: 310, ancho: 40, alto: 40, velocidadActual: 6 };
        let score = 0; let nivel = 1; let timerAnuncioNivel = 0;

        const configuracionNiveles = {
            1: { nombre: "Nivel 1: Salida de Asunción", fondo: "#e0f7fa", velocidad: 6 },
            2: { nombre: "Nivel 2: Cerros de Paraguarí", fondo: "#fff9c4", velocidad: 7.2 },
            3: { nombre: "Nivel 3: Cruce Coronel Oviedo", fondo: "#ffe0b2", velocidad: 8.5 },
            4: { nombre: "Nivel 4: Ka'akupé bajo la lluvia", fondo: "#b0bec5", velocidad: 9.8 },
            5: { nombre: "Nivel 5: Camino a Villarrica", fondo: "#c8e6c9", velocidad: 11 },
            6: { nombre: "Nivel 6: Pasando por Caazapá", fondo: "#d1c4e9", velocidad: 12.2 },
            7: { nombre: "Nivel 7: San Cosme y Damián", fondo: "#ffccbc", velocidad: 13.5 },
            8: { nombre: "Nivel 8: Costanera de Encarnación", fondo: "#bbdefb", velocidad: 14.8 },
            9: { nombre: "Nivel 9: Ruta Transchaco desértica", fondo: "#cfd8dc", velocidad: 16 },
            10: { nombre: "Nivel 10: ¡Llegada a Filadelfia!", fondo: "#b2dfdb", velocidad: 17.5 }
        };

        // --- CONTROLES (TECLADO Y PANTALLA TÁCTIL) ---
        function procesarAccionJugador(e) {
            // Evitar que el touch interactúe con el botón de compartir si está abierto
            if (document.getElementById("shareScreen").style.display === "flex") return;
            
            // Si es un evento táctil, previene que la pantalla se deslice
            if (e.type === "touchstart") e.preventDefault(); 

            if (estadoJuego === 'GAMEOVER') {
                prepararPrimerNivel();
            } else if (estadoJuego === 'INICIO') {
                estadoJuego = 'JUGANDO';
                timerAnuncioNivel = 90;
            } else if (estadoJuego === 'JUGANDO' && chipa.enElSuelo) {
                chipa.vy = chipa.salto;
                chipa.enElSuelo = false;
            }
        }

        // Escucha la barra espaciadora en PC
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") procesarAccionJugador(e);
            if (e.key.toLowerCase() === 'c' && estadoJuego === 'GAMEOVER') abrirCompartir();
        });

        // Escucha el toque en la pantalla del celular
        window.addEventListener("touchstart", procesarAccionJugador, {passive: false});

        function toggleFullscreen() {
            let container = document.getElementById("gameContainer");
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => {
                    alert(`Error intentando abrir pantalla completa: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // --- LÓGICA DEL JUEGO ---
        function prepararPrimerNivel() {
            score = 0; nivel = 1; estadoJuego = 'INICIO';
            chipa.y = 350 - TAMAÑO_CHIPA; chipa.vy = 0; chipa.enElSuelo = true;
            timerAnuncioNivel = 0; obstaculo.velocidadActual = configuracionNiveles[1].velocidad;
            reposicionarObstaculo();
        }

        function reposicionarObstaculo() {
            obstaculo.x = canvas.width + Math.random() * 450 + 150;
            obstaculo.ancho = 35 + Math.random() * 25;
            obstaculo.alto = 35 + Math.random() * 20;
            obstaculo.y = 350 - obstaculo.alto;
        }

        function actualizarDificultad() {
            let nivelAnterior = nivel;
            if (score < 5) nivel = 1; else if (score < 10) nivel = 2; else if (score < 15) nivel = 3; 
            else if (score < 25) nivel = 4; else if (score < 35) nivel = 5; else if (score < 45) nivel = 6; 
            else if (score < 55) nivel = 7; else if (score < 65) nivel = 8; else if (score < 75) nivel = 9; else nivel = 10;

            if (nivel !== nivelAnterior && nivel <= 10) timerAnuncioNivel = 90;
            obstaculo.velocidadActual = configuracionNiveles[nivel].velocidad;
        }

        // --- BUCLE DE JUEGO ---
        function loop() {
            if (estadoJuego === 'JUGANDO') {
                chipa.vy += chipa.gravedad; chipa.y += chipa.vy;
                const sueloY = 350 - chipa.alto;
                if (chipa.y >= sueloY) { chipa.y = sueloY; chipa.vy = 0; chipa.enElSuelo = true; }

                obstaculo.x -= obstaculo.velocidadActual;
                if (obstaculo.x < -obstaculo.ancho) { score++; actualizarDificultad(); reposicionarObstaculo(); }

                let margenX = chipa.ancho * 0.18; let margenY = chipa.alto * 0.1;   
                if (chipa.x + margenX < obstaculo.x + obstaculo.ancho && chipa.x + chipa.ancho - margenX > obstaculo.x &&
                    chipa.y + margenY < obstaculo.y + obstaculo.alto && chipa.y + chipa.alto > obstaculo.y) {
                    estadoJuego = 'GAMEOVER'; 
                }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (nivel === 1 && imgFondoLvl1.naturalWidth > 0) {
                ctx.drawImage(imgFondoLvl1, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = configuracionNiveles[nivel].fondo; ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            ctx.fillStyle = "#555555"; ctx.fillRect(0, 350, canvas.width, 50);
            ctx.fillStyle = "#ffd54f"; ctx.fillRect(0, 368, canvas.width, 4);

            let imagenADibujar = imgCorre1; 
            if (estadoJuego === 'GAMEOVER') { imagenADibujar = imgChoca; } 
            else if (!chipa.enElSuelo) { imagenADibujar = imgSalta; } 
            else if (estadoJuego === 'JUGANDO') {
                chipa.timerAnimacion++;
                if (chipa.timerAnimacion % 6 === 0) chipa.frameActual = (chipa.frameActual + 1) % 3; 
                if (chipa.frameActual === 0) imagenADibujar = imgCorre1;
                else if (chipa.frameActual === 1) imagenADibujar = imgCorre2;
                else imagenADibujar = imgCorre3;
            }

            if (imagenADibujar.naturalWidth > 0) ctx.drawImage(imagenADibujar, chipa.x, chipa.y, chipa.ancho, chipa.alto);

            ctx.fillStyle = "#3e2723"; ctx.fillRect(obstaculo.x, obstaculo.y, obstaculo.ancho, obstaculo.alto);
            ctx.fillStyle = (nivel === 4 || nivel === 9) ? "#ffffff" : "#000000"; ctx.font = "bold 15px Arial";
            ctx.fillText(configuracionNiveles[nivel].nombre, 20, 30); ctx.fillText("Chipas Salvadas: " + score, 20, 55);

            if (timerAnuncioNivel > 0 && estadoJuego === 'JUGANDO') {
                ctx.save(); ctx.textAlign = "center"; ctx.font = "bold 46px 'Impact', sans-serif";
                ctx.strokeStyle = "#000000"; ctx.lineWidth = 6; ctx.strokeText("NIVEL " + nivel, canvas.width / 2, 130);
                ctx.fillStyle = "#ffd54f"; ctx.fillText("NIVEL " + nivel, canvas.width / 2, 130); ctx.restore();
                timerAnuncioNivel--;
            }

            if (estadoJuego === 'INICIO') {
                ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ffffff"; ctx.font = "bold 32px 'Impact', sans-serif"; ctx.textAlign = "center";
                ctx.fillText("¡PREPARATE!", canvas.width / 2, 170); ctx.font = "18px Arial";
                ctx.fillText("TOCÁ LA PANTALLA o ESPACIO para viajar", canvas.width / 2, 220); ctx.textAlign = "start";
            }
            
            if (estadoJuego === 'GAMEOVER') {
                ctx.fillStyle = "rgba(0,0,0,0.75)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#ffffff"; ctx.font = "bold 26px Arial"; ctx.textAlign = "center";
                ctx.fillText("Chipas salvadas: " + score, canvas.width / 2, 150); ctx.font = "18px Arial"; ctx.fillStyle = "#e0e0e0";
                ctx.fillText("TOCÁ LA PANTALLA para reiniciar", canvas.width / 2, 210); ctx.fillStyle = "#ffd54f"; ctx.font = "bold 18px Arial";
                ctx.fillText("Botón 'C' (PC) para COMPARTIR tu logro", canvas.width / 2, 260); ctx.textAlign = "start"; 
                
                // Mostrar botón compartir en móviles explícitamente ya que no hay tecla C
                ctx.fillStyle = "#25D366"; ctx.fillRect(canvas.width / 2 - 80, 290, 160, 40);
                ctx.fillStyle = "#ffffff"; ctx.font = "bold 16px Arial"; ctx.fillText("COMPARTIR ➔", canvas.width / 2 - 60, 316);
            }

            requestAnimationFrame(loop);
        }

        // Botón visual para compartir en móviles (Detección de clic en el canvas)
        canvas.addEventListener("mousedown", (e) => checkShareClick(e.offsetX, e.offsetY));
        canvas.addEventListener("touchstart", (e) => {
            if(estadoJuego === 'GAMEOVER') {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (e.touches[0].clientX - rect.left) * scaleX;
                const y = (e.touches[0].clientY - rect.top) * scaleY;
                checkShareClick(x, y);
            }
        });

        function checkShareClick(x, y) {
            if (estadoJuego === 'GAMEOVER' && x > canvas.width / 2 - 80 && x < canvas.width / 2 + 80 && y > 290 && y < 330) {
                abrirCompartir();
            }
        }

        // --- INTERFAZ COMPARTIR ---
        function abrirCompartir() { document.getElementById("txtPuntajeLogro").innerText = `¡Salvaste ${score} chipas en la ruta!`; document.getElementById("shareScreen").style.display = "flex"; }
        function cerrarCompartir() { document.getElementById("shareScreen").style.display = "none"; }
        function obtenerMensaje() { let nombre = document.getElementById("playerName").value || "Un Viajero"; return encodeURIComponent(`¡${nombre} salvó ${score} chipas en el juego "La Chipa Viajera"! 🥮🇵🇾 ¿Podés superarlo?`); }
        function compartir(plataforma) {
            let t = obtenerMensaje(); let url = "";
            if (plataforma === 'whatsapp') url = `https://api.whatsapp.com/send?text=${t}`;
            else if (plataforma === 'facebook') url = `https://www.facebook.com/sharer/sharer.php?u=https://lachipaviajera.com&quote=${t}`;
            else if (plataforma === 'email') url = `mailto:?subject=¡Mi Logro en La Chipa Viajera!&body=${t}`;
            window.open(url, '_blank');
        }
        function descargarLogro() {
            let nombre = document.getElementById("playerName").value || "Un Viajero";
            let c = `--- CERTIFICADO DE LA CHIPA VIAJERA ---\n\nFelicitaciones ${nombre}.\nLograste salvar un total de: ${score} chipas en las rutas de Paraguay.\n\n¡Gracias por jugar!`;
            let blob = new Blob([c], { type: "text/plain;charset=utf-8" });
            let link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = `Logro_ChipaViajera_${nombre}.txt`; link.click();
        }
    </script>
</body>
</html>
